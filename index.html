<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品検索アプリ</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow-y: auto;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    body {
      padding: 20px;
      box-sizing: border-box;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 18px;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .button-row button {
      flex: 1;
      padding: 14px;
      font-size: 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    #scanBtn {
      background: #007bff;
      color: white;
    }

    #resetBtn {
      background: #dc3545;
      color: white;
    }

    .card {
      background: white;
      padding: 18px;
      border-radius: 10px;
      margin-top: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .card p {
      margin: 6px 0;
      font-size: 17px;
    }
  </style>
</head>
<body>

  <h2>JANコード検索</h2>

  <input id="jan" type="text" placeholder="JANコードを入力（13桁）">

  <div class="button-row">
    <button id="scanBtn">📷 読み取る</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="result"></div>

  <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
  <script src="script.js"></script>

  <!-- ★ Chromeキーボード対策：実際の表示領域の高さを使う -->
  <script>
    function adjustHeight() {
      document.body.style.minHeight = window.visualViewport.height + "px";
    }

    window.visualViewport.addEventListener("resize", adjustHeight);
    window.visualViewport.addEventListener("scroll", adjustHeight);
    adjustHeight();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
