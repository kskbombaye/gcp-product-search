<script>
let csvData = [];

function toHalfWidth(str) {
  return str.replace(/[！-～]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0xFEE0)
  );
}

/* CSV読み込み（新バージョンと同じ書き方） */
fetch("master.csv")
  .then(r => r.text())
  .then(text => {
    csvData = text.split("\n").map(row => {
      const cols = row.split(",").map(c => toHalfWidth(c.trim()));
      return cols;
    });
  });

/* JAN検索（新バージョンと同じ書き方） */
function searchJAN(jan) {
  const resultArea = document.getElementById("result");
  resultArea.innerHTML = "";

  if (!jan) return;

  const hit = csvData.find(row => row[0] === jan);

  if (!hit) {
    resultArea.innerHTML = `<div class="card">該当商品がありません</div>`;
    return;
  }

  resultArea.innerHTML = `
    <div class="card">
      <p><strong>商品名：</strong>${hit[1]}</p>
      <p><strong>規格：</strong>${hit[2]}</p>

      ${hit[3] && hit[3] !== "-" ? `<p><strong>値引：</strong>${hit[3]}円</p>` : ""}
      ${hit[4] && hit[4] !== "-" ? `<p><strong>値引期間：</strong>${hit[4]}</p>` : ""}

      ${hit[5] && hit[5] !== "-" ? `<p><strong>プラスポイント：</strong>${hit[5]}pt</p>` : ""}
      ${hit[6] && hit[6] !== "-" ? `<p><strong>PP期間：</strong>${hit[6]}</p>` : ""}

      ${hit[7] && hit[7] !== "-" ? `<p><strong>ポイント倍率：</strong>${hit[7]}倍</p>` : ""}
      ${hit[8] && hit[8] !== "-" ? `<p><strong>倍期間：</strong>${hit[8]}</p>` : ""}

      ${hit[9] && hit[9] !== "-" ? `<p><strong>売価配信：</strong>${hit[9]}</p>` : ""}
      ${hit[9] && hit[10] !== "-" ? `<p><strong>売価配信：</strong>${hit[10]}</p>` : ""}
    </div>
  `;
}

/* 入力イベント */
jan.addEventListener("input", e => {
  const code = toHalfWidth(e.target.value.trim());
  if (code.length === 13) searchJAN(code);
});

/* リセット */
resetBtn.addEventListener("click", () => {
  jan.value = "";
  result.innerHTML = "";
});
</script>
