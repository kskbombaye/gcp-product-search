<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品検索アプリ</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      padding: 24px;
      box-sizing: border-box;
      font-size: 18px;
      line-height: 1.6;
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 26px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 18px;
      background: #fff;
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .button-row button {
      flex: 1;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .button-row button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #scanBtn {
      background: #007bff;
      color: white;
    }

    #resetBtn {
      background: #dc3545;
      color: white;
    }

    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 18px;
      margin-top: 24px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      border: 1px solid #e5e5e5;
    }

    .card p {
      margin: 10px 0;
      font-size: 18px;
      line-height: 1.5;
    }

    /* スキャナー用フルスクリーンオーバーレイ */
    #scanner-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      color: #fff;
    }

    #scanner-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.6);
      box-sizing: border-box;
    }

    #scanner-title {
      font-size: 18px;
      font-weight: bold;
    }

    #scanner-close {
      padding: 8px 14px;
      font-size: 14px;
      border-radius: 999px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: #fff;
      cursor: pointer;
    }

    #scanner-close:active {
      background: rgba(255,255,255,0.3);
    }

    /* カメラ映像が描画される領域（Quaggaがここにvideo/canvasを追加） */
    #scanner-view {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ガイド枠 */
    #scan-guide {
      position: absolute;
      top: 35%;
      left: 10%;
      width: 80%;
      height: 30%;
      border: 3px solid rgba(0, 255, 0, 0.9);
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,255,0,0.7);
      pointer-events: none;
    }

    #scan-guide::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 5%;
      right: 5%;
      height: 2px;
      background: rgba(0,255,0,0.9);
    }

    #scanner-hint {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 16px;
      color: #fff;
      text-shadow: 0 0 6px #000;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1e1e1e;
        color: #ffffff;
      }

      input {
        background: #2c2c2c;
        color: #fff;
        border: 1px solid #444;
      }

      .card {
        background: #2c2c2c;
        border: 1px solid #444;
        box-shadow: none;
      }

      #scanBtn {
        background: #2196f3;
      }

      #resetBtn {
        background: #e53935;
      }
    }
  </style>
</head>
<body>

  <h2>JANコード検索</h2>

  <input id="jan" type="text" placeholder="JANコードを入力（13桁）">

  <div class="button-row">
    <button id="scanBtn">📷 読み取る</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="result"></div>

  <!-- フルスクリーン スキャナーUI -->
  <div id="scanner-overlay">
    <div id="scanner-header">
      <div id="scanner-title">バーコード読み取り</div>
      <button id="scanner-close">閉じる</button>
    </div>
    <div id="scanner-view">
      <div id="scan-guide"></div>
      <div id="scanner-hint">バーコードを枠に合わせてください</div>
    </div>
  </div>

  <!-- Quagga2 -->
  <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

  <script>
    let products = [];

    // CSV読み込み
    fetch('master.csv')
      .then(response => response.text())
      .then(csv => {
        const rows = csv.trim().split('\\n');
        for (let i = 1; i < rows.length; i++) {
          const cols = rows[i].split(',');
          products.push({
            jan: cols[0].trim(),
            name: cols[1],
            size: cols[2],
            discount: cols[3],
            discount_period: cols[4],
            plus_point: cols[5],
            plus_point_period: cols[6],
            point_rate: cols[7],
            point_rate_period: cols[8]
          });
        }
      });

    function searchJAN(jan) {
      const item = products.find(p => p.jan === jan);
      if (!item) {
        document.getElementById('result').innerHTML = "<p>該当商品がありません</p>";
        return;
      }

      let html = `
        <div class="card">
          <p><strong>商品名：</strong>${item.name}</p>
          <p><strong>規格：</strong>${item.size}</p>
      `;

      if (item.discount && item.discount !== "-") {
        html += `<p><strong>値引：</strong>${item.discount}円</p>`;
        html += `<p><strong>期間：</strong>${item.discount_period}</p>`;
      }

      if (item.plus_point && item.plus_point !== "-") {
        html += `<p><strong>プラスポイント：</strong>${item.plus_point}pt</p>`;
        html += `<p><strong>PP期間：</strong>${item.plus_point_period}</p>`;
      }

      if (item.point_rate && item.point_rate !== "-") {
        html += `<p><strong>ポイント倍率：</strong>${item.point_rate}倍</p>`;
        html += `<p><strong>倍期間：</strong>${item.point_rate_period}</p>`;
      }

      html += `</div>`;
      document.getElementById('result').innerHTML = html;
    }

    document.getElementById('jan').addEventListener('input', (e) => {
      if (e.target.value.length === 13) {
        searchJAN(e.target.value.trim());
      }
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('jan').value = "";
      document.getElementById('result').innerHTML = "";
    });

    const scannerOverlay = document.getElementById('scanner-overlay');
    const scannerView = document.getElementById('scanner-view');
    const scannerClose = document.getElementById('scanner-close');

    let lastCode = "";
    let lastTime = 0;
    let quaggaRunning = false;

    function startScanner() {
      if (quaggaRunning) return;

      scannerOverlay.style.display = 'flex';

      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: scannerView,
          constraints: {
            facingMode: "environment",
            width: { ideal: 640 },
            height: { ideal: 480 },
            aspectRatio: { ideal: 1.333 }
          }
        },
        locator: {
          patchSize: "medium",
          halfSample: true,
          roi: {
            x: 0.05,
            y: 0.25,
            width: 0.9,
            height: 0.5
          }
        },
        decoder: {
          readers: ["ean_reader"],
          multiple: false
        },
        numOfWorkers: 0
      }, function(err) {
        if (err) {
          alert("カメラが使用できません");
          scannerOverlay.style.display = 'none';
          return;
        }
        Quagga.start();
        quaggaRunning = true;
      });

      lastCode = "";
      lastTime = 0;

      Quagga.onDetected(onDetectedHandler);
    }

    function stopScanner() {
      if (quaggaRunning) {
        Quagga.offDetected(onDetectedHandler);
        Quagga.stop();
        quaggaRunning = false;
      }
      scannerOverlay.style.display = 'none';
    }

    function onDetectedHandler(data) {
      const code = data.codeResult.code;
      const now = Date.now();

      if (data.codeResult.confidence < 30) return;
      if (code === lastCode && now - lastTime < 800) return;

      lastCode = code;
      lastTime = now;

      document.getElementById('jan').value = code;
      searchJAN(code);
      stopScanner();
    }

    document.getElementById('scanBtn').addEventListener('click', startScanner);
    scannerClose.addEventListener('click', stopScanner);

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>
</body>
</html>
