<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品検索</title>

<style>
body{
    font-family:sans-serif;
    max-width:500px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    font-size:24px;
    padding:10px;
}

.card{
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    background:#f5f5f5;
}

.red{
    color:red;
}

.blue{
    color:blue;
}

.green{
    color:green;
}
</style>

</head>
<body>

<h2>商品検索</h2>

<input id="jan" placeholder="JANコード入力">

<div class="card">

<h3>商品名</h3>
<div id="name">-</div>

<h3>規格</h3>
<div id="size">-</div>

<h3 class="red">【値引】</h3>
<div id="discount">-</div>

<h3 class="blue">【プラスポイント】</h3>
<div id="pluspoint">-</div>

<h3 class="green">【ポイント倍率】</h3>
<div id="rate">-</div>

</div>

</body>
</html>
