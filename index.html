<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品検索アプリ</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- iOS用 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    /* ★ Chromeキーボード対策（最重要） */
    html, body {
      margin: 0;
      padding: 0;
      overflow-y: auto;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    body {
      padding: 24px;
      box-sizing: border-box;
      font-size: 18px;
      line-height: 1.6;
      padding-bottom: 200px; /* ← Chromeで隠れないための余白 */
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 26px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 18px;
      background: #fff;
    }

    /* 横並びボタン（アプリ風） */
    .button-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .button-row button {
      flex: 1;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .button-row button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #scanBtn {
      background: #007bff;
      color: white;
    }

    #resetBtn {
      background: #dc3545;
      color: white;
    }

    /* カードUI（アプリ風） */
    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 18px;
      margin-top: 24px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      border: 1px solid #e5e5e5;
    }

    .card p {
      margin: 10px 0;
      font-size: 18px;
      line-height: 1.5;
    }

    /* ダークモード対応 */
    @media (prefers-color-scheme: dark) {
      body {
        background: #1e1e1e;
        color: #ffffff;
      }

      input {
        background: #2c2c2c;
        color: #fff;
        border: 1px solid #444;
      }

      .card {
        background: #2c2c2c;
        border: 1px solid #444;
        box-shadow: none;
      }

      #scanBtn {
        background: #2196f3;
      }

      #resetBtn {
        background: #e53935;
      }
    }
  </style>
</head>
<body>

  <h2>JANコード検索</h2>

  <input id="jan" type="text" placeholder="JANコードを入力（13桁）">

  <div class="button-row">
    <button id="scanBtn">📷 読み取る</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="result"></div>

  <!-- Quagga2（バーコード読み取り） -->
  <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

  <!-- メイン処理 -->
  <script src="script.js"></script>

  <!-- ★ Chromeキーボード対策：実際の表示領域の高さを使う -->
  <script>
    function adjustHeight() {
      if (window.visualViewport) {
        document.body.style.minHeight = window.visualViewport.height + "px";
      }
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", adjustHeight);
      window.visualViewport.addEventListener("scroll", adjustHeight);
      adjustHeight();
    }
  </script>

  <!-- Service Worker 登録 -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
