<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品検索アプリ</title>
  <style>
    /* CSSはそのまま使用 */
    html, body { margin: 0; padding: 24px; background: #f0f0f0; font-family: Arial, sans-serif; box-sizing: border-box; }
    input { width: 100%; padding: 16px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 12px; font-size: 18px; box-sizing: border-box; }
    .button-row { display: flex; gap: 12px; margin-bottom: 12px; }
    button { flex: 1; padding: 16px; font-size: 18px; border-radius: 12px; border: none; cursor: pointer; color: white; }
    #scanBtn { background: #007bff; }
    #resetBtn { background: #dc3545; }
    .card { background: #fff; padding: 22px; border-radius: 18px; margin-top: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    #scanner-overlay { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 9999; }
    #scanner-view { position: relative; width: 100%; height: 80%; }
    #scanner-view video { width: 100%; height: 100%; object-fit: cover; }
    #scanner-close { padding: 20px; background: #444; color: #fff; border: none; }
  </style>
</head>
<body>

  <h2>JANコード検索</h2>
  <input id="jan" type="text" placeholder="JANコードを入力（13桁）" inputmode="numeric">
  <div class="button-row">
    <button id="scanBtn">📷 読み取る</button>
    <button id="resetBtn">リセット</button>
  </div>
  <div id="result"></div>

  <div id="scanner-overlay">
    <div id="scanner-view"></div>
    <button id="scanner-close">閉じる</button>
  </div>

  <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
  <script>
    let products = [];

    // CSV読み込み
    fetch('master.csv')
      .then(r => r.text())
      .then(csv => {
        const rows = csv.trim().split('\n');
        rows.slice(1).forEach(row => {
          const c = row.split(',');
          products.push({ jan: c[0].trim(), name: c[1], size: c[2], discount: c[3], discount_period: c[4], plus_point: c[5], plus_point_period: c[6], point_rate: c[7], point_rate_period: c[8] });
        });
      });

    // 検索ロジック
    function searchJAN(jan) {
      const item = products.find(p => p.jan === jan);
      document.getElementById('result').innerHTML = item ? 
        `<div class="card"><p><strong>商品名：</strong>${item.name}</p><p><strong>規格：</strong>${item.size}</p></div>` : 
        "<p>該当商品がありません</p>";
    }

    // スキャナー起動
    document.getElementById('scanBtn').addEventListener('click', () => {
      document.getElementById('scanner-overlay').style.display = 'flex';
      Quagga.init({
        inputStream: { type: "LiveStream", target: document.querySelector('#scanner-view'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["ean_reader"] }
      }, (err) => {
        if (err) return alert("カメラが使えません");
        Quagga.start();
      });
    });

    Quagga.onDetected(data => {
      const code = data.codeResult.code;
      document.getElementById('jan').value = code;
      searchJAN(code);
      Quagga.stop();
      document.getElementById('scanner-overlay').style.display = 'none';
    });

    document.getElementById('scanner-close').addEventListener('click', () => {
      Quagga.stop();
      document.getElementById('scanner-overlay').style.display = 'none';
    });
  </script>
</body>
</html>
