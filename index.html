<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品検索アプリ</title>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #f0f0f0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    body {
      padding: 24px;
      box-sizing: border-box;
      font-size: 18px;
      line-height: 1.6;
    }

    h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 26px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 18px;
      background: #fff;
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .button-row button {
      flex: 1;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .button-row button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    #scanBtn {
      background: #007bff;
      color: white;
    }

    #resetBtn {
      background: #dc3545;
      color: white;
    }

    .card {
      background: #ffffff;
      padding: 22px;
      border-radius: 18px;
      margin-top: 24px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.12);
      border: 1px solid #e5e5e5;
    }

    .card p {
      margin: 10px 0;
      font-size: 18px;
      line-height: 1.5;
    }

    /* ★ Chrome対策：画面下に大きな余白を作る */
    .bottom-space {
      height: 300px;
    }
  </style>
</head>
<body>

  <h2>JANコード検索</h2>

  <input id="jan" type="text" placeholder="JANコードを入力（13桁）">

  <div class="button-row">
    <button id="scanBtn">📷 読み取る</button>
    <button id="resetBtn">リセット</button>
  </div>

  <div id="result"></div>

  <!-- 画面下に余白（Chromeの強制スクロール対策） -->
  <div class="bottom-space"></div>

  <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("service-worker.js");
    }
  </script>

</body>
</html>
