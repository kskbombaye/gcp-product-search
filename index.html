<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>商品検索アプリ</title>
  <style>
    body { margin: 0; padding: 20px; background: #f4f4f9; font-family: sans-serif; }
    h2 { text-align: center; color: #333; }
    input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    .button-row { display: flex; gap: 10px; margin-bottom: 20px; }
    button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; color: white; }
    #scanBtn { background: #007bff; }
    #resetBtn { background: #6c757d; }
    .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .card p { margin: 8px 0; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    #scanner-overlay { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 9999; }
    #scanner-view { flex: 1; position: relative; }
    #scanner-view video { width: 100%; height: 100%; object-fit: cover; }
    #scanner-close { padding: 20px; background: #d9534f; color: white; border: none; font-size: 16px; }
  </style>
</head>
<body>

  <h2>商品検索</h2>
  <input id="jan" type="text" placeholder="JANコードを入力" inputmode="numeric">
  <div class="button-row">
    <button id="scanBtn">📷 読み取る</button>
    <button id="resetBtn">リセット</button>
  </div>
  <div id="result"></div>

  <div id="scanner-overlay">
    <div id="scanner-view"></div>
    <button id="scanner-close">閉じる</button>
  </div>

  <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
  <script>
    let products = [];

    // CSV読み込み
    fetch('master.csv')
      .then(r => r.text())
      .then(csv => {
        const rows = csv.trim().split('\n');
        products = rows.slice(1).map(row => {
          const c = row.split(',');
          return { jan: c[0]?.trim(), name: c[1], size: c[2], discount: c[3], discount_period: c[4], plus_point: c[5], plus_point_period: c[6], point_rate: c[7], point_rate_period: c[8] };
        });
      });

    function searchJAN(jan) {
      const item = products.find(p => p.jan === jan);
      if (!item) {
        document.getElementById('result').innerHTML = "<p>該当商品がありません</p>";
        return;
      }
      document.getElementById('result').innerHTML = `
        <div class="card">
          <p><strong>商品名：</strong>${item.name || '-'}</p>
          <p><strong>規格：</strong>${item.size || '-'}</p>
          <p><strong>値引：</strong>${item.discount || '-'}円</p>
          <p><strong>値引期間：</strong>${item.discount_period || '-'}</p>
          <p><strong>プラスポイント：</strong>${item.plus_point || '-'}pt</p>
          <p><strong>ポイント期間：</strong>${item.plus_point_period || '-'}</p>
          <p><strong>ポイント倍率：</strong>${item.point_rate || '-'}倍</p>
          <p><strong>倍期間：</strong>${item.point_rate_period || '-'}</p>
        </div>
      `;
    }

    // カメラ起動
    document.getElementById('scanBtn').addEventListener('click', () => {
      document.getElementById('scanner-overlay').style.display = 'flex';
      Quagga.init({
        inputStream: { type: "LiveStream", target: document.querySelector('#scanner-view'), constraints: { facingMode: "environment" } },
        decoder: { readers: ["ean_reader"] }
      }, (err) => {
        if (err) return alert("カメラが使えません。権限を確認してください。");
        Quagga.start();
      });
    });

    Quagga.onDetected(data => {
      const code = data.codeResult.code;
      document.getElementById('jan').value = code;
      searchJAN(code);
      Quagga.stop();
      document.getElementById('scanner-overlay').style.display = 'none';
    });

    document.getElementById('scanner-close').addEventListener('click', () => {
      Quagga.stop();
      document.getElementById('scanner-overlay').style.display = 'none';
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('jan').value = "";
      document.getElementById('result').innerHTML = "";
    });

    document.getElementById('jan').addEventListener('input', (e) => {
      if (e.target.value.length >= 13) searchJAN(e.target.value.trim());
    });
  </script>
</body>
</html>
